<aside class="sidebar" id="sidebar">
  <button class="sidebar__close" id="sidebar-close" aria-label="Close navigation">&times;</button>
  <nav class="sidebar__nav">
    {% for section in site.data.docs_nav %}
      <div class="sidebar__group">
        <h4 class="sidebar__heading">{{ section.group }}</h4>
        <ul class="sidebar__list">
          {% for item in section.items %}
            <li>
              <a href="{{ item.url | relative_url }}" class="sidebar__link {% if page.url == item.url %}sidebar__link--active{% endif %}">
                {{ item.title }}
              </a>
            </li>
          {% endfor %}
        </ul>
      </div>
    {% endfor %}
  </nav>
</aside>
